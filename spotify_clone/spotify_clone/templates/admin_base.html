{% extends 'base.html' %}
{% block body %}
<div class="admin-wrapper">
  <nav class="admin-sidebar">
    <div class="admin-logo">
      <svg viewBox="0 0 24 24" fill="#1DB954" width="32" height="32"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      <span>Admin Panel</span>
    </div>
    <ul class="admin-nav">
      <li><a href="{{ url_for('admin_dashboard') }}" class="{% if request.endpoint=='admin_dashboard' %}active{% endif %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="{{ url_for('admin_songs') }}" class="{% if request.endpoint=='admin_songs' %}active{% endif %}"><i class="fas fa-music"></i> Songs</a></li>
      <li><a href="{{ url_for('admin_albums') }}" class="{% if request.endpoint=='admin_albums' %}active{% endif %}"><i class="fas fa-compact-disc"></i> Albums</a></li>
      <li><a href="{{ url_for('admin_users') }}" class="{% if request.endpoint=='admin_users' %}active{% endif %}"><i class="fas fa-users"></i> Users</a></li>
      <li><a href="{{ url_for('admin_logs') }}" class="{% if request.endpoint=='admin_logs' %}active{% endif %}"><i class="fas fa-list-alt"></i> Login Logs</a></li>
    </ul>
    <div class="admin-sidebar-footer">
      <span><i class="fas fa-shield-alt"></i> {{ session.admin_name }}</span>
      <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
  </nav>
  <main class="admin-main">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
