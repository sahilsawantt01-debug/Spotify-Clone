{% extends 'base.html' %}
{% block title %}Sign Up - Spotify{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="#1DB954" width="44" height="44"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      <span style="font-size:1.8rem;font-weight:900;">Spotify</span>
    </div>
    <h1>Sign up for free</h1>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" name="username" class="auth-input" placeholder="Choose a username" required/>
      </div>
      <div class="auth-field">
        <label>Email address</label>
        <input type="email" name="email" class="auth-input" placeholder="Your email address" required/>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" name="password" class="auth-input" placeholder="Create a password (min 6 chars)" required minlength="6"/>
      </div>
      <button type="submit" class="auth-btn">CREATE ACCOUNT</button>
    </form>
    <div class="auth-switch">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
